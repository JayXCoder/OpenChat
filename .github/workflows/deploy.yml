name: Deploy Gate

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (deploy gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: openchat_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d openchat_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/openchat_test
        run: pytest -q

  frontend-tests:
    name: Frontend Tests (deploy gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  frontend-e2e:
    name: Frontend Browser E2E (deploy gate)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: frontend
    needs:
      - frontend-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run browser E2E
        run: npm run test:e2e

  build-backend-image:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-tests
      - frontend-tests
      - frontend-e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: ollamachat/backend:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend-image:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - backend-tests
      - frontend-tests
      - frontend-e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          tags: ollamachat/frontend:main-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-postgres-image:
    name: Resolve Postgres Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - backend-tests
      - frontend-tests
      - frontend-e2e
    steps:
      - name: Pull postgres image used by compose
        run: docker pull postgres:16-alpine

      - name: Verify postgres image exists
        run: docker image inspect postgres:16-alpine > /tmp/postgres-image.json

  finalize-deploy-gate:
    name: Finalize Deploy Gate
    runs-on: ubuntu-latest
    needs:
      - build-backend-image
      - build-frontend-image
      - build-postgres-image
    steps:
      - name: All tests and image builds passed
        run: echo "Deploy gate passed."
